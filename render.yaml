services:
  - type: web
    name: grain-web-showcase
    env: python
    buildCommand: pip install -r requirements.txt -r requirements-clip.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATA_DIR
        value: /var/data
      - key: COOKIE_SECURE
        value: "true"
      - key: PERSON_RETRIEVER_BACKEND
        value: grain
      - key: GENERAL_RETRIEVER_BACKEND
        value: openclip
      - key: GENERAL_OPENCLIP_MODEL
        value: ViT-B-16
      - key: GENERAL_OPENCLIP_PRETRAINED
        value: laion2b_s34b_b88k
      - key: GRAIN_CONFIG_FILE
        sync: false
      - key: GRAIN_CHECKPOINT
        sync: false
      - key: ALLOW_RETRIEVER_FALLBACK
        value: "true"
      - key: SUPER_ADMIN_EMAIL
        value: admin@grain.local
      - key: SUPER_ADMIN_PASSWORD
        sync: false
      - key: INVITE_BOOTSTRAP_CODES
        sync: false
    disk:
      name: grain-web-data
      mountPath: /var/data
      sizeGB: 1
